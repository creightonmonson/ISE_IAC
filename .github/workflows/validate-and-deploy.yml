name: Validate and Trigger ISE Deployment
on: [push, pull_request]

jobs:
  # STEP 1: Linting - Ensuring the YAML is high quality
  ansible-lint:
    name: Ansible Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        with:
          setup_python: "true"
          requirements_file: "ansible-lint-requirements.yml"

  # STEP 2: Dry Run - Testing logic against the ISE OpenAPI
  ansible-dry-run:
    name: ISE Dry Run (Check Mode)
    runs-on: self-hosted
    needs: ansible-lint
    # Using a container that has our ISE collections
    container: cmons/cisco-ise-ee
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Run ansible playbook dry-run
        run: |
          ls -la
          ansible --version
          ansible-playbook ISE_Deploy.yml -i ISE_hosts.yml --check
        env:
          ANSIBLE_COLLECTIONS_PATH: /usr/share/ansible/collections

# fix permissions
  fix-permissions:
    name: fix permissions after Docker run
    runs-on: self-hosted
    needs: ansible-dry-run
    steps:
      - name: Correct permissions on runner
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }}


